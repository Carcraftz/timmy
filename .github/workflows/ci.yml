name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true
          cache-dependency-path: |
            backend/go.mod
            backend/go.sum
            cli/go.mod
            go.work

      - name: Run tests
        run: make test

      - name: Build CLI
        run: make build-cli

      - name: Build backend
        run: make build-backend
