services:
  postgres:
    image: postgres:16
    container_name: timmy-postgres
    environment:
      POSTGRES_DB: timmy
      POSTGRES_USER: timmy
      POSTGRES_PASSWORD: timmy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timmy -d timmy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
